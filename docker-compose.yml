version: '3.8'

services:
  neo4j:
    image: neo4j:latest
    container_name: careergraph-neo4j
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_plugins:/plugins
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: careergraph-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_plugins:
